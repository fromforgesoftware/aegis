apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: aegis

# Local dev only. `skaffold dev` builds the image and deploys it via Helm
# to a local cluster. Prod is deployed by the release pipeline using the
# published OCI chart + image (see deploy/helm/envs/prod/values.yaml).
profiles:
  - name: local
    activation:
      - command: dev
    build:
      artifacts:
        - image: forge/aegis
          # Standalone repo: build context is this repo's root and the
          # Dockerfile lives there too (no monorepo replace directives).
          context: .
          docker:
            dockerfile: Dockerfile
    manifests:
      helm:
        releases:
          - name: aegis
            chartPath: deploy/helm
            valuesFiles:
              - deploy/helm/envs/local/values.yaml
            setValueTemplates:
              image.repository: '{{.IMAGE_REPO_forge_aegis}}'
              image.tag: '{{.IMAGE_TAG_forge_aegis}}@{{.IMAGE_DIGEST_forge_aegis}}'
    deploy:
      helm: {}
