<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>{{.Title}}</title>
		<style>
			body {
				font-family: system-ui, sans-serif;
				max-width: 22rem;
				margin: 4rem auto;
				padding: 0 1rem;
				color: #1a1a1a;
			}
			h1 {
				font-size: 1.3rem;
			}
			label {
				display: block;
				margin: 0.75rem 0 0.25rem;
				font-size: 0.85rem;
			}
			input {
				width: 100%;
				padding: 0.5rem;
				border: 1px solid #ccc;
				border-radius: 0.375rem;
				box-sizing: border-box;
			}
			button {
				margin-top: 1rem;
				width: 100%;
				padding: 0.6rem;
				border: 0;
				border-radius: 0.375rem;
				background: #1a1a1a;
				color: #fff;
				font-size: 0.95rem;
				cursor: pointer;
			}
			.err {
				margin-top: 1rem;
				padding: 0.5rem 0.75rem;
				background: #fde8e8;
				color: #9b1c1c;
				border-radius: 0.375rem;
				font-size: 0.85rem;
			}
		</style>
	</head>
	<body>
		<h1>{{.Title}}</h1>
		{{if .Message}}
		<div class="err">{{.Message}}</div>
		{{end}}
		<form
			method="post"
			action="{{.Action}}"
			hx-post="{{.Action}}"
			hx-target="body"
			hx-swap="outerHTML"
		>
			<input type="hidden" name="flow" value="{{.FlowID}}" />
			<input type="hidden" name="return_to" value="{{.ReturnTo}}" />
			{{range .Fields}}
			<label for="{{.Name}}">{{.Label}}</label>
			<input
				id="{{.Name}}"
				name="{{.Name}}"
				type="{{.InputType}}"
				{{if
				.Required}}required{{end}}
			/>
			{{end}}
			<button type="submit">{{.Submit}}</button>
		</form>
	</body>
</html>
