{{- if not .Values.crypto.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegis.cryptoSecretName" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
type: Opaque
stringData:
  AEGIS_KEY_ENCRYPTION_KEY: {{ required "crypto.keyEncryptionKey or crypto.existingSecret is required" .Values.crypto.keyEncryptionKey | quote }}
{{- end }}
